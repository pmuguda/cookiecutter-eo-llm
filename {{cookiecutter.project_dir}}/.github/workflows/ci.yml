name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Type check
        run: uv run mypy src/

  test:
    name: test (py{% raw %}${{ matrix.python-version }}{% endraw %})
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Set up Python {% raw %}${{ matrix.python-version }}{% endraw %}
        run: uv python install {% raw %}${{ matrix.python-version }}{% endraw %}

      - name: Install dependencies
        run: uv sync --dev --python {% raw %}${{ matrix.python-version }}{% endraw %}

      - name: Run tests
        run: |
          uv run python -m pytest \
            --cov=src/{{cookiecutter.project_slug}} \
            --cov-report=xml \
            --cov-report=term-missing \
            -q

      - name: Generate coverage badge
        if: {% raw %}${{ matrix.python-version == '3.12' }}{% endraw %}
        run: uv run genbadge coverage --input-file coverage.xml --output-file coverage.svg --local

      - name: Upload coverage badge
        if: {% raw %}${{ matrix.python-version == '3.12' }}{% endraw %}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-badge
          path: coverage.svg
          retention-days: 7

  deploy-docs:
    name: deploy docs
    runs-on: ubuntu-latest
    needs: test
    if: {% raw %}${{ github.ref == 'refs/heads/main' }}{% endraw %}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --dev --extra docs

      - name: Download coverage badge
        uses: actions/download-artifact@v4
        with:
          name: coverage-badge
          path: docs/badges/

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy to GitHub Pages
        run: uv run mkdocs gh-deploy --force

  deploy-pypi:
    name: deploy pypi
    runs-on: ubuntu-latest
    needs: test
    if: {% raw %}${{ startsWith(github.ref, 'refs/tags/v') }}{% endraw %}
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Build
        run: uv build

      - name: Publish to PyPI
        run: uv publish
