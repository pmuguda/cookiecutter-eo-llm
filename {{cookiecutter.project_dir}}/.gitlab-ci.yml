stages:
  - lint
  - test
  - publish

.base:
  image: python:3.12-slim
  before_script:
    - pip install uv
    - uv sync --dev

lint:
  extends: .base
  stage: lint
  script:
    - uv run ruff check src/ tests/
    - uv run mypy src/

test:
  extends: .base
  stage: test
  parallel:
    matrix:
      - PYTHON_VERSION: ["3.10", "3.11", "3.12"]
  image: python:${PYTHON_VERSION}-slim
  script:
    - uv run pytest
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

publish:
  extends: .base
  stage: publish
  only:
    - tags
  script:
    - uv build
    - uv publish
  environment: pypi
