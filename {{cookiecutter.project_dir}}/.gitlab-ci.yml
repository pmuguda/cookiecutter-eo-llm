stages:
  - build
  - test
  - deploy

# ── shared base ────────────────────────────────────────────────────────────────

.base:
  image: python:3.12-slim
  before_script:
    - pip install uv --quiet

# ── build ──────────────────────────────────────────────────────────────────────

build:
  extends: .base
  stage: build
  script:
    - uv sync --dev
    - uv run ruff check src/ tests/
    - uv run mypy src/

# ── test ───────────────────────────────────────────────────────────────────────

.test-template:
  extends: .base
  stage: test
  coverage: '/^TOTAL.+?(\d+\%)$/'
  artifacts:
    when: on_failure
    paths:
      - ./approval-artifacts/*received*
    expire_in: 1 day
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

test-dev:
  extends: .test-template
  script:
    - uv sync --dev
    - uv run python -m pytest
        --cov=src/{{cookiecutter.project_slug}}
        --cov-report=xml
        --cov-report=term-missing
        -q
  after_script:
    - mkdir -p approval-artifacts
    - mv tests/approval/approved_files/*received* ./approval-artifacts/ || true
  rules:
    - if: $CI_COMMIT_TAG == null
      when: always

test-release:
  extends: .test-template
  script:
    - uv sync
    - uv run python -m pytest
        --cov=src/{{cookiecutter.project_slug}}
        --cov-report=xml
        -q
  rules:
    - if: $CI_COMMIT_TAG
      when: always

# ── deploy ─────────────────────────────────────────────────────────────────────

deploy-docs:
  extends: .base
  stage: deploy
  needs: [test-dev]
  script:
    - uv sync --dev --extra docs
    - uv run mkdocs build --site-dir public
  artifacts:
    paths:
      - public
  pages: true
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

deploy-pypi-gitlab:
  extends: .base
  stage: deploy
  needs: [test-release]
  script:
    - uv build
    - uv publish
        --publish-url ${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/pypi
        --username gitlab-ci-token
        --password ${CI_JOB_TOKEN}
  rules:
    - if: $CI_COMMIT_TAG
      when: on_success

deploy-pypi-public:
  extends: .base
  stage: deploy
  needs: [test-release]
  script:
    - uv build
    - uv publish
  rules:
    - if: $CI_COMMIT_TAG
      when: manual
