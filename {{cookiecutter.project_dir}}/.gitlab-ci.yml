stages:
  - build
  - test
  - deploy

# ── shared base ─────────────────────────────────────────────────────────────────

.base:
  image: python:3.12-slim
  before_script:
    - pip install uv --quiet

# ── 1. BUILD ────────────────────────────────────────────────────────────────────
# Always runs.
# On tags: also runs `uv build` and exposes dist/ as a job artifact.
# On plain commits: lint + typecheck only.

build:
  extends: .base
  stage: build
  script:
    - uv sync --dev
    - uv run ruff check src/ tests/
    - uv run mypy src/
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        uv build
      fi
  artifacts:
    paths:
      - dist/
    when: on_success
    expire_in: 1 week

# ── 2. TEST ─────────────────────────────────────────────────────────────────────
# test-dev     → non-tag commits  (development workflow)
# test-release → tags only        (release validation, stricter)

.test-template:
  extends: .base
  stage: test
  needs: [build]
  coverage: '/^TOTAL.+?(\d+\%)$/'
  artifacts:
    when: on_failure
    paths:
      - ./approval-artifacts/*received*
    expire_in: 1 day
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

test-dev:
  extends: .test-template
  script:
    - uv sync --dev
    - uv run python -m pytest
        --cov=src/{{cookiecutter.project_slug}}
        --cov-report=xml
        --cov-report=term-missing
        -q
  after_script:
    - mkdir -p approval-artifacts
    - mv tests/approval/approved_files/*received* ./approval-artifacts/ || true
  rules:
    - if: $CI_COMMIT_TAG == null
      when: always

test-release:
  extends: .test-template
  script:
    - uv sync --dev
    - uv run python -m pytest
        --cov=src/{{cookiecutter.project_slug}}
        --cov-report=xml
        -q
  rules:
    - if: $CI_COMMIT_TAG
      when: always

# ── 3. DEPLOY ───────────────────────────────────────────────────────────────────
# deploy-docs        → default branch only, after test-dev
# deploy-pypi-gitlab → tag only, after test-release, uses wheel from build job
# deploy-pypi-public → tag only, manual gate (publish to PyPI.org)

deploy-docs:
  extends: .base
  stage: deploy
  needs: [test-dev]
  script:
    - uv sync --dev --extra docs
    - uv run mkdocs build --site-dir public
  artifacts:
    paths:
      - public
  pages: true
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

deploy-pypi-gitlab:
  extends: .base
  stage: deploy
  needs:
    - job: build
      artifacts: true
    - job: test-release
  script:
    - uv publish
        --publish-url ${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/pypi
        --username gitlab-ci-token
        --password ${CI_JOB_TOKEN}
        dist/*
  rules:
    - if: $CI_COMMIT_TAG
      when: on_success

deploy-pypi-public:
  extends: .base
  stage: deploy
  needs:
    - job: build
      artifacts: true
    - job: test-release
  script:
    - uv publish dist/*
  rules:
    - if: $CI_COMMIT_TAG
      when: manual
