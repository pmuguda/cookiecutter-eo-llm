name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --dev --python ${{ matrix.python-version }}

      - name: Lint
        run: uv run ruff check hooks/ tests/

      - name: Type check
        run: uv run mypy hooks/ tests/

      - name: Test with coverage
        run: |
          uv run python -m pytest \
            --cov=hooks \
            --cov=tests/helpers \
            --cov-report=xml \
            --cov-report=term-missing \
            -q

      - name: Generate coverage badge
        if: matrix.python-version == '3.12'
        run: uv run genbadge coverage --input-file coverage.xml --output-file coverage.svg --local

      - name: Upload coverage badge
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-badge
          path: coverage.svg
          retention-days: 7

  docs:
    name: build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Install doc dependencies
        run: uv sync --dev --extra docs --python 3.12

      - name: Build docs
        run: uv run mkdocs build --strict
