name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --dev
      - name: Lint
        run: uv run ruff check hooks/ tests/
      - name: Type check
        run: uv run mypy hooks/ tests/

  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --dev --python ${{ matrix.python-version }}
      - name: Run tests
        run: |
          uv run python -m pytest \
            --cov=hooks \
            --cov=tests/helpers \
            --cov-report=xml \
            --cov-report=term-missing \
            -q
      - name: Generate coverage badge
        if: matrix.python-version == '3.12'
        run: uv run genbadge coverage --input-file coverage.xml --output-file coverage.svg --local
      - name: Upload coverage badge
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-badge
          path: coverage.svg
          retention-days: 7

  deploy:
    name: deploy docs
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v4
      - name: Install dependencies
        run: uv sync --dev --extra docs
      - name: Download coverage badge
        uses: actions/download-artifact@v4
        with:
          name: coverage-badge
          path: docs/badges/
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Deploy to GitHub Pages
        run: uv run mkdocs gh-deploy --force
