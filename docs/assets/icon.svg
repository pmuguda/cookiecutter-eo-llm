<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <defs>
    <clipPath id="earth">
      <circle cx="20" cy="22" r="10"/>
    </clipPath>
  </defs>

  <!-- Deep space background -->
  <rect width="40" height="40" rx="8" fill="#0a0e1a"/>

  <!-- Orbit ring — behind earth (dim) -->
  <ellipse cx="20" cy="22" rx="15" ry="6.5"
           fill="none" stroke="white" stroke-width="1.1"
           stroke-dasharray="2.2 1.6" opacity="0.3"
           transform="rotate(-28, 20, 22)"/>

  <!-- Earth: flat blue -->
  <circle cx="20" cy="22" r="10" fill="#1e40af"/>

  <!-- Continents clipped inside earth -->
  <g clip-path="url(#earth)" fill="#16a34a" opacity="0.88">
    <ellipse cx="17"   cy="23"   rx="2.4" ry="4.3"/>
    <ellipse cx="24"   cy="18.5" rx="3.8" ry="2.5"/>
    <ellipse cx="11"   cy="21"   rx="1.6" ry="3.3"/>
    <ellipse cx="25.5" cy="27"   rx="1.8" ry="1.4"/>
  </g>

  <!-- Orbit ring — front of earth (bright) -->
  <ellipse cx="20" cy="22" rx="15" ry="6.5"
           fill="none" stroke="white" stroke-width="1.1"
           stroke-dasharray="2.2 1.6" opacity="0.82"
           transform="rotate(-28, 20, 22)"/>

  <!-- Satellite-scissors at top-right of orbit -->
  <!-- Pivot at (26.5, 10.5) -->

  <!-- Upper blade — swings into space -->
  <line x1="26.5" y1="10.5" x2="21.5" y2="6.8"
        stroke="white" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Lower blade — cuts into the earth cookie -->
  <line x1="26.5" y1="10.5" x2="21.8" y2="14.8"
        stroke="white" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Pivot screw -->
  <circle cx="26.5" cy="10.5" r="1.5" fill="white"/>
  <circle cx="26.5" cy="10.5" r="0.65" fill="#0a0e1a"/>

  <!-- Satellite body -->
  <rect x="27.8" y="9.3" width="4.8" height="2.4" rx="0.7" fill="white"/>

  <!-- Ring handles -->
  <circle cx="34.2" cy="9.7"  r="1.4" fill="none" stroke="white" stroke-width="1"/>
  <circle cx="34.2" cy="12.1" r="1.4" fill="none" stroke="white" stroke-width="1"/>
</svg>
