<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#4F46E5"/>
      <stop offset="50%"  stop-color="#9333EA"/>
      <stop offset="100%" stop-color="#F43F5E"/>
    </linearGradient>
    <clipPath id="c"><circle cx="20" cy="24" r="12"/></clipPath>
  </defs>

  <!-- Background tile -->
  <rect width="40" height="40" rx="9" fill="url(#g)"/>

  <!-- Earth globe (white base) -->
  <circle cx="20" cy="24" r="12" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.9)" stroke-width="1.2"/>

  <!-- Land masses (white) clipped to globe -->
  <g clip-path="url(#c)" fill="white" opacity="0.85">
    <ellipse cx="17" cy="25" rx="3"   ry="5"/>
    <ellipse cx="25" cy="21" rx="4"   ry="2.5"/>
    <ellipse cx="12" cy="22" rx="1.8" ry="3.5"/>
    <ellipse cx="23" cy="30" rx="2.5" ry="1.5"/>
  </g>

  <!-- Cookie cutter ring on top of globe -->
  <circle cx="20" cy="16" r="7"
          fill="none"
          stroke="white" stroke-width="1.6"
          stroke-dasharray="2.8 1.6"
          opacity="0.95"/>

  <!-- Cutter handle -->
  <rect x="15.5" y="3" width="9" height="4" rx="1.8"
        fill="white" opacity="0.95"/>

  <!-- Cutter legs -->
  <line x1="17.5" y1="7" x2="15" y2="9.5" stroke="white" stroke-width="1.3" opacity="0.85"/>
  <line x1="22.5" y1="7" x2="25" y2="9.5" stroke="white" stroke-width="1.3" opacity="0.85"/>
</svg>
