<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <defs>
    <clipPath id="earth">
      <circle cx="20" cy="22" r="10"/>
    </clipPath>
  </defs>

  <!-- Deep space background -->
  <rect width="40" height="40" rx="8" fill="#0a0e1a"/>

  <!-- Orbit ring — behind earth (dim) -->
  <ellipse cx="20" cy="22" rx="15" ry="6.5"
           fill="none" stroke="white" stroke-width="1.1"
           stroke-dasharray="2.2 1.6" opacity="0.3"
           transform="rotate(-28, 20, 22)"/>

  <!-- Earth: flat blue -->
  <circle cx="20" cy="22" r="10" fill="#1e40af"/>

  <!-- Land masses (clipped to earth) — flat green, no gradient -->
  <g clip-path="url(#earth)" fill="#16a34a" opacity="0.88">
    <!-- Africa / Europe -->
    <ellipse cx="17"  cy="23"  rx="2.4" ry="4.3"/>
    <!-- Asia -->
    <ellipse cx="24"  cy="18.5" rx="3.8" ry="2.5"/>
    <!-- Americas -->
    <ellipse cx="11"  cy="21"  rx="1.6" ry="3.3"/>
    <!-- Australia -->
    <ellipse cx="25.5" cy="27" rx="1.8" ry="1.4"/>
  </g>

  <!-- Orbit ring — in front of earth (bright), same path drawn on top -->
  <ellipse cx="20" cy="22" rx="15" ry="6.5"
           fill="none" stroke="white" stroke-width="1.1"
           stroke-dasharray="2.2 1.6" opacity="0.82"
           transform="rotate(-28, 20, 22)"/>

  <!-- Satellite — top-right of orbit, clear of earth -->
  <!-- Body -->
  <rect x="25.5" y="9.5" width="5.5" height="2.6" rx="0.5" fill="white"/>
  <!-- Solar panel left -->
  <rect x="21.8" y="10.2" width="3.3" height="1.2" rx="0.3" fill="#93c5fd"/>
  <!-- Solar panel right -->
  <rect x="31"   y="10.2" width="3.3" height="1.2" rx="0.3" fill="#93c5fd"/>
  <!-- Antenna -->
  <line x1="28.2" y1="9.5" x2="28.2" y2="7.5"
        stroke="white" stroke-width="0.65"/>
  <circle cx="28.2" cy="7.1" r="0.85"
          fill="none" stroke="white" stroke-width="0.6"/>
</svg>
