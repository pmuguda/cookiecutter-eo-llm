<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <defs>
    <linearGradient id="cutter-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#4F46E5"/>
      <stop offset="50%"  stop-color="#9333EA"/>
      <stop offset="100%" stop-color="#F43F5E"/>
    </linearGradient>
    <linearGradient id="ocean-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <clipPath id="globe-clip">
      <circle cx="21" cy="26" r="13"/>
    </clipPath>
  </defs>

  <!-- ── Earth cookie ─────────────────────── -->
  <circle cx="21" cy="26" r="13" fill="url(#ocean-grad)"/>

  <!-- Land masses clipped to globe -->
  <g clip-path="url(#globe-clip)" fill="#2d6a4f" opacity="0.9">
    <ellipse cx="18" cy="27" rx="3.5" ry="5.5"/>
    <ellipse cx="26" cy="22" rx="4.5" ry="3"/>
    <ellipse cx="13" cy="23" rx="2"   ry="4"/>
    <ellipse cx="23" cy="32" rx="3"   ry="2"/>
  </g>

  <!-- Subtle latitude ring -->
  <ellipse cx="21" cy="26" rx="13" ry="5"
           fill="none" stroke="#fff" stroke-width="0.35" opacity="0.18"/>

  <!-- Globe outline -->
  <circle cx="21" cy="26" r="13"
          fill="none" stroke="#30363d" stroke-width="0.6"/>

  <!-- ── Cookie cutter tool ───────────────── -->
  <!-- Handle (gradient bar across top) -->
  <rect x="14" y="1" width="14" height="4.5" rx="2" fill="url(#cutter-grad)"/>

  <!-- Cutter ring pressing down -->
  <circle cx="21" cy="14" r="8"
          fill="rgba(79,70,229,0.12)"
          stroke="url(#cutter-grad)" stroke-width="1.8"/>

  <!-- Dashed cut impression on earth -->
  <circle cx="21" cy="14" r="8"
          fill="none" stroke="#fff" stroke-width="0.7"
          stroke-dasharray="2.2 1.4" opacity="0.65"/>

  <!-- Cutter legs connecting handle to ring -->
  <line x1="17" y1="5.5" x2="15" y2="6.5" stroke="url(#cutter-grad)" stroke-width="1.2"/>
  <line x1="25" y1="5.5" x2="27" y2="6.5" stroke="url(#cutter-grad)" stroke-width="1.2"/>
</svg>
