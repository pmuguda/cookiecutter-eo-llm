site_name: cookiecutter-eo-llm
site_description: Cookiecutter template for EO/SAR Python packages with token-efficient LLM-agnostic context files
site_url: https://pmuguda.github.io/cookiecutter-eo-llm/
repo_url: https://github.com/pmuguda/cookiecutter-eo-llm
repo_name: pmuguda/cookiecutter-eo-llm
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: deep-orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: deep-orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Getting Started:
      - Quickstart: quickstart.md
      - Installation: installation.md
  - Reference:
      - Template Variables: variables.md
      - Generated Structure: structure.md
      - Hooks: hooks.md
  - Guides:
      - Adding a Workflow: guides/add-workflow.md
      - LLM Context Files: guides/llm-context.md
      - CI/CD: guides/cicd.md
  - Contributing: contributing.md
  - Changelog: changelog.md
