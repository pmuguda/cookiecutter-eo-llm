site_name: cookiecutter-eo-llm
site_description: Cookiecutter template for EO/SAR Python packages with token-efficient LLM-agnostic context files
site_url: https://pmuguda.github.io/cookiecutter-eo-llm/
site_author: Pavan Muguda Sanjeevamurthy
repo_url: https://github.com/pmuguda/cookiecutter-eo-llm
repo_name: pmuguda/cookiecutter-eo-llm
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    scheme: slate
    primary: black
    accent: deep purple
  font:
    text: Inter
    code: JetBrains Mono
  logo: assets/icon.svg
  favicon: assets/icon.svg
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

extra_css:
  - assets/style.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/pmuguda/cookiecutter-eo-llm
      name: GitHub
    - icon: fontawesome/solid/mug-hot
      link: https://ko-fi.com/pavan_muguda
      name: Buy me a coffee
    - icon: fontawesome/solid/globe
      link: https://pmuguda.github.io
      name: Portfolio
  generator: false

copyright: >
  Made by <a class="gradient-text" href="https://pmuguda.github.io" target="_blank" rel="noopener">Pavan Muguda Sanjeevamurthy</a>
  &nbsp;·&nbsp;
  <a class="kofi-link" href="https://ko-fi.com/pavan_muguda" target="_blank" rel="noopener">☕ Buy me a coffee</a>

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Getting Started:
      - Quickstart: quickstart.md
      - Installation: installation.md
  - Reference:
      - Template Variables: variables.md
      - Generated Structure: structure.md
      - Hooks: hooks.md
  - Guides:
      - Adding a Workflow: guides/add-workflow.md
      - Config Model Design: guides/config-design.md
      - LLM Context Files: guides/llm-context.md
      - CI/CD: guides/cicd.md
  - Contributing: contributing.md
  - Changelog: changelog.md
